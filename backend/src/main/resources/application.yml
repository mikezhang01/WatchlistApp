spring:
  application:
    name: cinestack-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cinestack}
    username: ${DATABASE_USERNAME:cinestack}
    password: ${DATABASE_PASSWORD:cinestack}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-development-secret}
    expiration-minutes: 120
  tmdb:
    api-key: ${TMDB_API_KEY:}
    base-url: https://api.themoviedb.org/3
    request-min-interval-ms: ${TMDB_REQUEST_MIN_INTERVAL_MS:250}
    request-max-wait-ms: ${TMDB_REQUEST_MAX_WAIT_MS:2000}
    cache-refresh-days: ${TMDB_CACHE_REFRESH_DAYS:30}
    cache-max-age-days: ${TMDB_CACHE_MAX_AGE_DAYS:175}
    cache-maintenance-cron: ${TMDB_CACHE_MAINTENANCE_CRON:0 15 3 * * *}
    purge-on-startup: ${TMDB_PURGE_ON_STARTUP:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
