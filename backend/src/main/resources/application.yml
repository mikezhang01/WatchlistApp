spring:
  application:
    name: cinestack-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cinestack}
    username: ${DATABASE_USERNAME:cinestack}
    password: ${DATABASE_PASSWORD:cinestack}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-development-secret}
    expiration-minutes: 120
  tmdb:
    api-key: ${TMDB_API_KEY:}
    base-url: https://api.themoviedb.org/3
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

