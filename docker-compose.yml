services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cinestack}
      POSTGRES_USER: ${POSTGRES_USER:-cinestack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cinestack}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinestack} -d ${POSTGRES_DB:-cinestack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cinestack}
      DATABASE_USERNAME: ${POSTGRES_USER:-cinestack}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-cinestack}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-very-long-development-secret}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_REQUEST_MIN_INTERVAL_MS: ${TMDB_REQUEST_MIN_INTERVAL_MS:-250}
      TMDB_REQUEST_MAX_WAIT_MS: ${TMDB_REQUEST_MAX_WAIT_MS:-2000}
      TMDB_CACHE_REFRESH_DAYS: ${TMDB_CACHE_REFRESH_DAYS:-30}
      TMDB_CACHE_MAX_AGE_DAYS: ${TMDB_CACHE_MAX_AGE_DAYS:-175}
      TMDB_PURGE_ON_STARTUP: ${TMDB_PURGE_ON_STARTUP:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
