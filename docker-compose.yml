services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cinestack
      POSTGRES_USER: cinestack
      POSTGRES_PASSWORD: cinestack
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinestack -d cinestack"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/cinestack
      DATABASE_USERNAME: cinestack
      DATABASE_PASSWORD: cinestack
      JWT_SECRET: change-me-to-a-very-long-development-secret
      TMDB_API_KEY: ""
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:

